<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta | Fleitas Silvina</title>

<meta name="description" content="Iniciá tu consulta de trámite automotor.">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NKTJH805B0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-NKTJH805B0');
</script>

<style>
body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:#0b0b0b;
  color:white;
}

.container{
  max-width:520px;
  margin:auto;
  padding:40px 20px;
}

h1{
  margin-bottom:10px;
}

p{
  color:#bbb;
}

form{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

input, textarea{
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

textarea{
  min-height:100px;
}

button{
  padding:14px;
  border-radius:30px;
  background:#8c1c2c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.note{
  font-size:0.8rem;
  color:#888;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Iniciar consulta</h1>

<p>
Completá el formulario y te respondemos en el día.
</p>

<form id="form">

<input type="text" placeholder="Nombre y apellido" required>
<input type="email" placeholder="Email" required>
<input type="tel" placeholder="WhatsApp" required>
<textarea placeholder="Describí tu consulta" required></textarea>

<button type="submit">Enviar consulta</button>

</form>

<p class="note">
También podés escribir directamente por WhatsApp.
</p>

</div>

<script>
<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const nombre = document.querySelector('input[type="text"]').value;
  const email = document.querySelector('input[type="email"]').value;
  const telefono = document.querySelector('input[type="tel"]').value;
  const mensaje = document.querySelector('textarea').value;

  const texto = `Hola, quiero hacer una consulta.

Nombre: ${nombre}
Email: ${email}
WhatsApp: ${telefono}
Consulta: ${mensaje}`;

  const textoCodificado = encodeURIComponent(texto);

  const url = `https://wa.me/5491139253152?text=${textoCodificado}`;

  window.open(url, "_blank");

  // Evento Analytics
  if (typeof gtag === "function") {
    gtag('event', 'generate_lead', {
      event_category: 'formulario',
      event_label: 'consulta_whatsapp'
    });
  }
});
</script>

</body>
</html>
