<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta | Fleitas Silvina</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:#fff;
}

.container{
  max-width:520px;
  margin:auto;
  padding:40px 20px;
}

form{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:20px;
}

input,textarea,select{
  padding:12px;
  border-radius:10px;
  border:none;
}

textarea{min-height:120px;}

button{
  padding:14px;
  border:none;
  border-radius:30px;
  background:#8c1c2c;
  color:#fff;
  font-weight:bold;
}

.success{
  display:none;
  margin-top:20px;
  color:#4ade80;
}
</style>
</head>

<body>

<div class="container">

<h1>Iniciar consulta</h1>
<p>Completá el formulario y te contactamos por WhatsApp.</p>

<form id="form">

  <select id="tipo" required>
    <option value="">Tipo de trámite</option>
    <option value="transferencia">Transferencia</option>
    <option value="informe">Informe de dominio</option>
    <option value="0km">Inscripción 0km</option>
    <option value="asesoramiento">Asesoramiento</option>
  </select>

  <input id="nombre" type="text" placeholder="Nombre y apellido" required>
  <input id="email" type="email" placeholder="Email" required>
  <input id="telefono" type="tel" placeholder="WhatsApp" required>
  <textarea id="consulta" placeholder="Describí tu consulta" required></textarea>

  <button id="btnEnviar" type="submit">Enviar consulta</button>

</form>

<div class="success" id="success">
✔ Te redirigimos a WhatsApp para continuar la gestión
</div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const btn = document.getElementById("btnEnviar");
  btn.disabled = true;
  btn.textContent = "Abriendo WhatsApp...";

  const tipo = document.getElementById("tipo").value;
  const nombre = document.getElementById("nombre").value.trim();
  const email = document.getElementById("email").value.trim();
  const tel = document.getElementById("telefono").value.trim();
  const consulta = document.getElementById("consulta").value.trim();

  if(!tipo || !nombre || !email || !tel || !consulta){
    alert("Completá todos los campos.");
    btn.disabled = false;
    btn.textContent = "Enviar consulta";
    return;
  }

  // mensajes personalizados
  let extra = "";

  if(tipo === "transferencia"){
    extra = "🚗 Trámite: Transferencia (prioridad en documentación)";
  } 
  else if(tipo === "informe"){
    extra = "📄 Trámite: Informe de dominio";
  } 
  else if(tipo === "0km"){
    extra = "🆕 Trámite: Inscripción 0km";
  } 
  else {
    extra = "💬 Trámite: Asesoramiento";
  }

  const texto = `Hola, quiero iniciar una consulta de trámite automotor.%0A%0A
${extra}%0A%0A
👤 Nombre: ${nombre}%0A
📧 Email: ${email}%0A
📱 WhatsApp: ${tel}%0A%0A
🚗 Consulta:%0A${consulta}%0A%0A
Quedo a la espera de la información para avanzar con el trámite.`;

  document.getElementById("success").style.display = "block";

  if(typeof gtag==="function"){
    gtag('event','generate_lead',{
      event_category:'whatsapp',
      event_label:'consulta_automotor'
    });
  }

  setTimeout(()=>{
    window.location.href =
      "https://wa.me/5491139253152?text=" + encodeURIComponent(texto);
  },800);

});
</script>

</body>
</html>
