<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const nombre = document.querySelector('input[type="text"]').value;
  const email = document.querySelector('input[type="email"]').value;
  const telefono = document.querySelector('input[type="tel"]').value;
  const mensaje = document.querySelector('textarea').value;

  const texto = `Hola, quiero hacer una consulta.

Nombre: ${nombre}
Email: ${email}
WhatsApp: ${telefono}
Consulta: ${mensaje}`;

  const textoCodificado = encodeURIComponent(texto);

  const url = `https://wa.me/5491139253152?text=${textoCodificado}`;

  window.open(url, "_blank");

  // Evento Analytics
  if (typeof gtag === "function") {
    gtag('event', 'generate_lead', {
      event_category: 'formulario',
      event_label: 'consulta_whatsapp'
    });
  }
});
</script>
